name: CI

# CI is disabled for now — runs only when triggered manually from the Actions tab.
# To re-enable automatic runs, uncomment the push/pull_request triggers below.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_16.1.app

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build & run tests
        run: |
          xcodebuild test \
            -project PangoLock.xcodeproj \
            -scheme PangoLock \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build
