name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_16.1.app

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build & run tests
        run: |
          xcodebuild test \
            -project PangoLock.xcodeproj \
            -scheme PangoLock \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build
